<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志分析工具 | Log Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="logo-text">Log Analyzer</span>
            </div>
            <div class="header-subtitle">日志计数可视化分析工具</div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section card">
                <div class="card-header">
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>上传日志文件</h2>
                </div>
                <div class="upload-layout">
                    <div class="upload-area" id="dropZone">
                        <input type="file" id="fileInput" webkitdirectory multiple class="file-input" style="z-index: 2;">
                        <div class="upload-placeholder">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="upload-text">拖拽文件或目录到此处</p>
                            <p class="upload-hint">支持 .log, .txt, .json 文件及 .zip, .tar.gz 压缩包</p>
                            <div class="upload-buttons">
                                <button class="btn btn-primary" id="uploadBtn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="17 8 12 3 7 8"></polyline>
                                        <line x1="12" y1="3" x2="12" y2="15"></line>
                                    </svg>
                                    选择目录
                                </button>
                            </div>
                        </div>
                        <div class="file-list" id="fileList"></div>
                    </div>
                    <div class="parsers-panel">
                        <div class="parsers-header">
                            <svg class="parsers-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                            </svg>
                            <h3>解析器</h3>
                        </div>
                        <div class="parsers-list" id="parsersList">
                            <div class="parsers-empty">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="status-bar">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span class="status-text" id="status">等待上传...</span>
                </div>
            </section>

            <!-- Data Selection Section -->
            <section class="data-selection-section card" id="dataSelection">
                <div class="card-header">
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    <h2>数据选择</h2>
                </div>
                <div class="data-selection-layout">
                    <!-- Left: Tree Selection -->
                    <div class="selection-tree-panel">
                        <div class="tree-toolbar">
                            <div class="tree-search">
                                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.35-4.35"></path>
                                </svg>
                                <input type="text" id="treeSearch" placeholder="搜索实例或计数...">
                            </div>
                            <div class="tree-actions">
                                <button class="tree-action-btn" id="expandAll" title="展开/折叠">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <button class="tree-action-btn" id="selectAll" title="全选">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 11 12 14 22 4"></polyline>
                                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                                    </svg>
                                </button>
                                <button class="tree-action-btn" id="clearAll" title="清空">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="15" y1="9" x2="9" y2="15"></line>
                                        <line x1="9" y1="9" x2="15" y2="15"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="tree-content" id="treeContent"></div>
                    </div>

                    <!-- Divider -->
                    <div class="selection-divider"></div>

                    <!-- Right: Selected Items -->
                    <div class="selection-preview-panel">
                        <div class="preview-header">
                            <span>已选择</span>
                            <span class="selection-info" id="selectionInfo">0 项</span>
                        </div>
                        <div class="preview-items" id="selectedItems">
                            <div class="preview-empty">请从左侧选择数据</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section card">
                <div class="card-header">
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    <h2>趋势图表</h2>
                    <span class="chart-badge" id="dataCount">0 条数据</span>
                </div>
                <div class="chart-container" id="chart"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <span>Log Analyzer</span>
            <span class="separator">|</span>
            <span>数据驱动洞察</span>
        </footer>
    </div>

    <script src="/static/js/dataProcessor.js"></script>
    <script src="/static/js/chart.js"></script>
    <script src="/static/js/interactions.js"></script>
    <script src="/static/js/ui.js"></script>
</body>
</html>
